<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Moroccan Tape Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d0d12;
--card:#16161f;
--border:#2c2c3c;
--accent:#f5c842;
--text:#e4e4f0;
--muted:#777793;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Syne',sans-serif;
margin:0;
}

header{
background:#12121a;
border-bottom:1px solid var(--border);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:800;
font-size:18px;
color:var(--accent);
}

nav button{
background:none;
border:none;
color:var(--muted);
font-family:'JetBrains Mono',monospace;
font-size:11px;
margin-left:14px;
cursor:pointer;
}

nav button.active{
color:var(--accent);
}

.page{
max-width:900px;
margin:auto;
padding:30px 20px 80px;
display:none;
}

.page.active{
display:block;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.searchbox{
margin:25px 0;
}

.searchbox input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid var(--border);
background:#15151e;
color:white;
font-size:16px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:16px;
margin-bottom:12px;
display:flex;
gap:14px;
}

.ref{
font-family:'JetBrains Mono',monospace;
color:var(--muted);
min-width:35px;
}

.artist{
font-weight:700;
}

.album{
color:var(--muted);
font-size:14px;
margin-top:3px;
}

.tags{
margin-top:8px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.tag{
font-size:9px;
padding:4px 7px;
border-radius:10px;
font-family:'JetBrains Mono',monospace;
}

.genre{background:#223c74;color:#6fa8ff;}
.dig{background:#1e5338;color:#4dff9f;}
.not{background:#3a3a45;color:#9a9ab0;}
.yt{background:#541a1a;color:#ff7070;}
.ig{background:#472f59;color:#d69aff;}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:20px;
}

.stat{
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
text-align:center;
}

.stat h2{
font-size:32px;
color:var(--accent);
margin:0;
}

.stat p{
font-size:11px;
color:var(--muted);
margin-top:4px;
font-family:'JetBrains Mono',monospace;
}

</style>

</head>

<body>

<header>

<div class="logo">📼 Tape Archive</div>

<nav>
<button class="active" onclick="showPage('search',this)">Search</button>
<button onclick="showPage('dashboard',this)">Dashboard</button>
<button onclick="showPage('collection',this)">Collection</button>
</nav>

</header>

<!-- SEARCH -->

<div class="page active" id="search">

<h1>Find a Tape</h1>

<div class="searchbox">
<input id="q" placeholder="Search artist, album, genre…" oninput="search()">
</div>

<div id="results"></div>

</div>

<!-- DASHBOARD -->

<div class="page" id="dashboard">

<h1>Archive Stats</h1>

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>Total Tapes</p>
</div>

<div class="stat">
<h2 id="digitized">0</h2>
<p>Digitized</p>
</div>

<div class="stat">
<h2 id="published">0</h2>
<p>Published</p>
</div>

</div>

</div>

<!-- COLLECTION -->

<div class="page" id="collection">

<h1>Full Collection</h1>

<div id="collectionlist"></div>

</div>

<script>

const SHEET="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1YCCoP2M9d_QiOHHYyVLXdL_nFAxhuo3cW1c2nl8T1goEYyHtgNnVwyskR6UnowzW7mTv7K9twuy7/pub?output=csv";

let TAPES=[];

function showPage(id,btn){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}

function parseCSV(text){

const rows=text.trim().split("\n").map(r=>r.split(","));

const headers=rows.shift();

return rows.map(r=>{
let o={};
headers.forEach((h,i)=>o[h.trim()]=r[i]);
return o;
});

}

async function load(){

const res=await fetch(SHEET);

const csv=await res.text();

const data=parseCSV(csv);

TAPES=data.map((r,i)=>({

ref:r["REF"]||i+1,

artist:r["Artist"]||"",

album:r["Album_Title"]||"",

genre:r["Genre_Category"]||"",

digitized:(r["Digitized"]||"").toLowerCase()=="yes",

youtube:(r["YOUTUBE"]||"").toLowerCase()=="posted",

instagram:(r["INSTAGRAM"]||"").toLowerCase()=="posted"

}));

renderCollection();

search();

updateStats();

}

function card(t){

let tags="";

tags+=t.digitized?'<span class="tag dig">DIGITIZED</span>':'<span class="tag not">NOT DIGITIZED</span>';

if(t.genre)tags+=`<span class="tag genre">${t.genre}</span>`;

if(t.youtube)tags+='<span class="tag yt">YOUTUBE</span>';

if(t.instagram)tags+='<span class="tag ig">INSTAGRAM</span>';

return`

<div class="card">

<div class="ref">#${t.ref}</div>

<div>

<div class="artist">${t.artist}</div>

<div class="album">${t.album}</div>

<div class="tags">${tags}</div>

</div>

</div>

`;

}

function search(){

const q=document.getElementById("q").value.toLowerCase();

const filtered=TAPES.filter(t=>

t.artist.toLowerCase().includes(q)||

t.album.toLowerCase().includes(q)||

t.genre.toLowerCase().includes(q)

);

document.getElementById("results").innerHTML=filtered.map(card).join("");

}

function renderCollection(){

document.getElementById("collectionlist").innerHTML=TAPES.map(card).join("");

}

function updateStats(){

document.getElementById("total").innerText=TAPES.length;

document.getElementById("digitized").innerText=TAPES.filter(t=>t.digitized).length;

document.getElementById("published").innerText=TAPES.filter(t=>t.youtube||t.instagram).length;

}

load();

</script>

</body>
</html>
